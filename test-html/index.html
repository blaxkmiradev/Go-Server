<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go-Server | Welcome</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }
        
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 500px;
        }
        
        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: pulse 2s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #4ecdc4, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #8892b0;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(78, 205, 196, 0.15);
            border-radius: 50px;
            color: #4ecdc4;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #4ecdc4;
            border-radius: 50%;
            animation: blink 1.5s ease-in-out infinite;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        
        .features {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .feature {
            padding: 10px 20px;
            background: rgba(255,255,255,0.08);
            border-radius: 12px;
            font-size: 0.85rem;
            color: #a8b2d1;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        
        .feature:hover {
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            transform: translateY(-2px);
        }
        
        .server-info {
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        
        .server-info p {
            color: #5f637a;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .server-info code {
            background: rgba(78, 205, 196, 0.15);
            color: #4ecdc4;
            padding: 4px 12px;
            border-radius: 6px;
            font-family: 'Consolas', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚀</div>
        <h1>Go-Server</h1>
        <p class="subtitle">Your All-in-One Local & Public Server</p>
        
        <div class="status">
            <span class="status-dot"></span>
            Server Running
        </div>
        
        <div class="features">
            <span class="feature">HTML Hosting</span>
            <span class="feature">Flask Proxy</span>
            <span class="feature">Cloudflare</span>
        </div>
        
        <div class="server-info">
            <p>Access locally</p>
            <code>http://localhost:8080</code>
        </div>
    </div>
</body>
</html>
